task: detection

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox', ]

# num_classes: 365
# remap_mscoco_category: False

# num_classes: 91
# remap_mscoco_category: False

num_classes: 7
remap_mscoco_category: True


train_dataloader: 
  type: DataLoader
  dataset: 
    type: CocoDetectionRGBD
    img_folder: /storage/irem/datasets_scriptie/unified_dataset/train/images
    depth_folder: /storage/irem/datasets_scriptie/unified_dataset/train/depths_DAS
    ann_file: /storage/irem/datasets_scriptie/unified_dataset/annotations/train.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: True
  num_workers: 4
  drop_last: True 
  collate_fn:
    type: BatchImageCollateFunction


val_dataloader:
  type: DataLoader
  dataset: 
    type: CocoDetectionRGBD
    img_folder: /storage/irem/datasets_scriptie/unified_dataset/valid/images
    depth_folder: /storage/irem/datasets_scriptie/unified_dataset/valid/depths_DAS
    ann_file: /storage/irem/datasets_scriptie/unified_dataset/annotations/valid.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~ 
  shuffle: False
  num_workers: 4
  drop_last: False
  collate_fn:
    type: BatchImageCollateFunction
